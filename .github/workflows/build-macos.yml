name: Build macOS App (High Sierra)

on:
  workflow_dispatch:

jobs:
  build-macos:

    runs-on: macos-11

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller==5.13.2
        pip install PySide6==6.4.3
        pip install pandas==2.0.3
        pip install openpyxl

    - name: Build app
      run: |
        pyinstaller \
          --windowed \
          --name SeatApp \
          --target-architecture x86_64 \
          main.py

    - name: Package app
      run: |
        cd dist
        zip -r SeatApp-macOS-HighSierra.zip SeatApp.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SeatApp-macOS-HighSierra
        path: dist/SeatApp-macOS-HighSierra.zip